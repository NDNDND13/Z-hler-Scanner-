<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zähler-Scanner</title>
<style>
  :root {
    --ink: #0d1b2a;
    --paper: #f5f3ee;
    --signal: #ff5a1f;
    --ok: #1f7a4d;
    --mono: "SF Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--ink); color: var(--paper);
    font-family: "Helvetica Neue", Arial, sans-serif; }
  body { display: flex; flex-direction: column; min-height: 100dvh; }
  header { padding: 14px 18px 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: baseline; justify-content: space-between; }
  header .mark { font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--signal); }
  header h1 { font-size: 17px; font-weight: 700; }

  .stage { position: relative; flex: 1; min-height: 0; background: #000;
    display: flex; align-items: center; justify-content: center; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: cover; }
  .overlay { position: absolute; inset: 0; pointer-events: none; }
  .scan-frame { position: absolute; left: 50%; top: 46%; transform: translate(-50%,-50%);
    width: 78%; height: 78px; box-shadow: 0 0 0 9999px rgba(5,8,12,0.62); border-radius: 6px;
    border: 2px solid var(--signal); }
  .hint { position: absolute; left: 0; right: 0; top: calc(46% + 58px); text-align: center;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(245,243,238,0.72); padding: 0 24px; }

  .start-cover { position: absolute; inset: 0; z-index: 4; background: var(--ink);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 28px; gap: 18px; }
  .start-cover p { font-family: var(--mono); font-size: 13px; line-height: 1.6;
    color: rgba(245,243,238,0.8); }
  .start-cover.hidden { display: none; }

  .panel { padding: 16px 18px calc(16px + env(safe-area-inset-bottom)); background: var(--ink);
    border-top: 1px solid rgba(255,255,255,0.08); }
  .readout { background: #0a141f; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 14px; min-height: 78px; display: flex; flex-direction: column;
    justify-content: center; }
  .readout .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(245,243,238,0.5); margin-bottom: 6px; }
  .readout .value { font-family: var(--mono); font-size: 30px; font-weight: 700;
    letter-spacing: 0.06em; word-break: break-all; line-height: 1.1; }
  .readout .value.placeholder { color: rgba(245,243,238,0.28); }
  .readout .value.done { color: var(--signal); }
  .readout .meta { font-family: var(--mono); font-size: 11px; color: var(--ok); margin-top: 6px;
    min-height: 14px; }

  .btn { width: 100%; border: 0; border-radius: 10px; padding: 16px; font-family: var(--mono);
    font-size: 14px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    background: var(--signal); color: #1a0a02; cursor: pointer; }
  .btn:active { transform: scale(0.985); }
  .btn:disabled { opacity: 0.45; }

  #log { font-family: var(--mono); font-size: 11px; line-height: 1.5; color: #ffb38a;
    padding: 8px 18px; background: #160a04; border-top: 1px solid rgba(255,90,31,0.3);
    max-height: 96px; overflow: auto; white-space: pre-wrap; display: none; }
  #log.show { display: block; }
  canvas { display: none; }
</style>
</head>
<body>
  <header>
    <h1>Zähler-Scanner</h1>
    <span class="mark">OCR · Demo</span>
  </header>

  <div class="stage">
    <video id="video" playsinline muted autoplay></video>
    <div class="overlay">
      <div class="scan-frame"></div>
      <div class="hint">Ziffernrolle in den Rahmen legen</div>
    </div>
    <div class="start-cover" id="startCover">
      <p>Tippe auf „Kamera starten".<br>iOS fragt dann nach Kamerazugriff – bitte erlauben.</p>
      <button class="btn" id="startBtn" style="width:auto;padding:16px 28px;">Kamera starten</button>
    </div>
  </div>

  <div class="panel">
    <div class="readout">
      <div class="label">Zählerstand</div>
      <div class="value placeholder" id="value">– – – – –</div>
      <div class="meta" id="meta"></div>
    </div>
    <button class="btn" id="scanBtn" disabled>Scannen</button>
  </div>

  <div id="log"></div>
  <canvas id="canvas"></canvas>

<script>
const $ = id => document.getElementById(id);
const logEl = $('log');
function log(msg) {
  logEl.classList.add('show');
  logEl.textContent += msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}
window.onerror = (m, src, line) => { log('FEHLER: ' + m + ' (Zeile ' + line + ')'); };
window.addEventListener('unhandledrejection', e => { log('FEHLER (promise): ' + (e.reason && e.reason.message ? e.reason.message : e.reason)); });

const video   = $('video');
const canvas  = $('canvas');
const ctx     = canvas.getContext('2d');
const scanBtn = $('scanBtn');
const startBtn= $('startBtn');
const startCover = $('startCover');
const valueEl = $('value');
const metaEl  = $('meta');

let worker = null;
let tesseractLoaded = false;

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = 'Starte …';
  try {
    log('Fordere Kamerazugriff an …');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    });
    video.srcObject = stream;
    await video.play();
    log('Kamera läuft ✓');
    startCover.classList.add('hidden');
    scanBtn.disabled = false;
  } catch (err) {
    log('Kamera-Fehler: ' + err.name + ' – ' + err.message);
    startBtn.disabled = false;
    startBtn.textContent = 'Erneut versuchen';
  }
});

function loadTesseract() {
  return new Promise((resolve, reject) => {
    if (tesseractLoaded) return resolve();
    log('Lade OCR-Bibliothek …');
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = () => { tesseractLoaded = true; log('OCR geladen ✓'); resolve(); };
    s.onerror = () => reject(new Error('OCR-Bibliothek konnte nicht geladen werden (Netzwerk/CDN blockiert?)'));
    document.head.appendChild(s);
  });
}

scanBtn.addEventListener('click', async () => {
  scanBtn.disabled = true;
  valueEl.className = 'value'; valueEl.textContent = 'lese …'; metaEl.textContent = '';
  try {
    await loadTesseract();
    if (!worker) {
      log('Initialisiere OCR …');
      worker = await Tesseract.createWorker('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '7' });
      log('OCR bereit ✓');
    }
    const vw = video.videoWidth, vh = video.videoHeight;
    const cropW = vw * 0.78, cropH = vh * 0.16;
    const cropX = (vw - cropW) / 2, cropY = vh * 0.46 - cropH / 2;
    const scale = 3;
    canvas.width = cropW * scale; canvas.height = cropH * scale;
    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
    const img = ctx.getImageData(0,0,canvas.width,canvas.height), d = img.data;
    for (let i=0;i<d.length;i+=4){ const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]; const v=g>110?255:0; d[i]=d[i+1]=d[i+2]=v; }
    ctx.putImageData(img,0,0);
    const { data } = await worker.recognize(canvas);
    const digits = (data.text||'').replace(/\D/g,'');
    if (digits.length >= 3) {
      valueEl.textContent = digits; valueEl.className = 'value done';
      metaEl.textContent = '✓ erkannt · Konfidenz ' + Math.round(data.confidence||0) + '%';
    } else {
      valueEl.textContent = '– – – – –'; valueEl.className = 'value placeholder';
      metaEl.style.color = '#ff5a1f'; metaEl.textContent = 'Keine Ziffern erkannt – näher ran, ruhig halten.';
      setTimeout(()=>{ metaEl.style.color=''; }, 2500);
    }
  } catch (e) {
    log('Scan-Fehler: ' + (e.message || e));
    valueEl.textContent = 'Fehler'; valueEl.className = 'value placeholder';
  } finally {
    scanBtn.disabled = false;
  }
});

log('App geladen ✓ – tippe „Kamera starten".');
</script>
</body>
</html>
